[package]
name = "fs-ocr"
version = "0.1.0"
edition = "2021"
description = "Fast OCR library for Foxhole stockpile screenshots"
license = "MIT"
authors = ["Foxhole Stockpiles Contributors"]

[lib]
name = "fs_ocr"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.24", features = ["extension-module"] }
numpy = "0.24"
ndarray = "0.16"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
base64 = "0.22"
rayon = "1.10"
chrono = { version = "0.4", features = ["serde"] }
image = "0.25"

# Native libraries
hdf5 = "0.8"
leptess = "0.14"

[dev-dependencies]
tempfile = "3.14"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[features]
default = []
# Enable full OCR with native dependencies
full = []
